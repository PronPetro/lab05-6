<html>
    <head>
        <title>Використання таблиць</title>
        <link rel="stylesheet" href="style.css" />
        <meta charset="utf-8" />
    </head>
    <body>
        <table width="75%" border="1">
            <tr align="center">
                <td colspan="2">Заголовок</td>
            </tr>
            <tr valign="top">
                <td align="left" width="25%">
                    Дані, вирівняні по лівому краю комірки
                </td>
                <td align="right" width="75%">
                    Дані, вирівняні по правому краю комірки
                </td>
            </tr>
            <tr>
                <td>25% ширини таблиці</td>
                <td>75% ширини таблиці</td>
            </tr>
        </table>
    </body>
</html>
