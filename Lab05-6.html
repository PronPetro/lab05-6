<html>
    <head>
        <title>Використання таблиць</title>
        <link rel="stylesheet" href="style.css" />
        <meta charset="utf-8" />
    </head>
    <body>
        <table border="1" cellspacing="0" cellpadding="6">
            <caption>
                Таблиця з різним вирівнюванням
            </caption>

            <tr>
                <th>id</th>
                <th>ім’я</th>
                <th>вік</th>
                <th>місто</th>
                <th>професія</th>
            </tr>

            <tr style="text-align: left">
                <td>1</td>
                <td>іван</td>
                <td>19</td>
                <td>київ</td>
                <td>студент</td>
            </tr>

            <tr style="text-align: center">
                <td>2</td>
                <td>олена</td>
                <td>22</td>
                <td>львів</td>
                <td>дизайнер</td>
            </tr>

            <tr style="text-align: right">
                <td>3</td>
                <td>макс</td>
                <td>25</td>
                <td>харків</td>
                <td>інженер</td>
            </tr>

            <tr style="text-align: left">
                <td>4</td>
                <td>анна</td>
                <td>18</td>
                <td>одеса</td>
                <td>учень</td>
            </tr>

            <tr style="text-align: center">
                <td>5</td>
                <td>петро</td>
                <td>30</td>
                <td>дніпро</td>
                <td>розробник</td>
            </tr>

            <tr style="text-align: right">
                <td>6</td>
                <td>софія</td>
                <td>27</td>
                <td>полтава</td>
                <td>архітектор</td>
            </tr>

            <tr style="text-align: left">
                <td>7</td>
                <td>артем</td>
                <td>21</td>
                <td>ужгород</td>
                <td>аналітик</td>
            </tr>
        </table>
    </body>
</html>
