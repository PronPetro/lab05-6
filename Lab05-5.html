<!doctype html>
<html>
    <head>
        <title>Windows 9</title>
        <link rel="stylesheet" href="style.css" />
        <meta charset="utf-8" />
    </head>

    <body class="windows">
        <div class="windows__frame">
            <h1>Start</h1>
            <table class="windows__frame-table">
                <tr>
                    <td class="frame-table__desktop" rowspan="2" colspan="2">
                        Desktop
                    </td>
                    <td bgcolor="blue">Calendar</td>
                    <td bgcolor="green">Maps</td>
                    <td bgcolor="purple">Music</td>
                </tr>

                <tr>
                    <td bgcolor="red" rowspan="2">Finances</td>
                    <td bgcolor="orange">Weather</td>
                    <td bgcolor="coral">Camera</td>
                </tr>

                <tr>
                    <td class="frame-table__gambling">Gambling</td>
                    <td bgcolor="PaleVioletRed" colspan="2" rowspan="2">
                        <img
                            src="https://media1.tenor.com/m/tHpkwlsb0MsAAAAd/epstein-jefrey.gif"
                            alt="img"
                        />
                    </td>
                    <td bgcolor="orange">Settings</td>
                </tr>

                <tr>
                    <td bgcolor="green">Slipbox</td>
                    <td bgcolor="purple">Zrada</td>
                    <td class="frame-table__csgo">
                        Counter Strike: Gambling Offensive
                    </td>
                </tr>

                <tr>
                    <td bgcolor="salmon">Store</td>
                    <td bgcolor="green">Slopify</td>
                    <td bgcolor="seagreen">MeinKraft</td>
                    <td bgcolor="orange">Zim Text Editor</td>
                    <td bgcolor="red">FPV Drone Launcher</td>
                </tr>
            </table>
        </div>
    </body>
</html>
